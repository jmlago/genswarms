{% extends "base.html" %}

{% block extrahead %}
  {{ super() }}
  {%- if page %}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "TechArticle",
        "headline": {{ (page.title or config.site_name) | tojson }},
        "description": {{ (page.meta.description or config.site_description) | tojson }},
        "url": {{ page.canonical_url | tojson }},
        "inLanguage": "en",
        "isPartOf": { "@type": "WebSite", "name": "GenSwarms", "url": "https://genswarms.com/" },
        "publisher": { "@type": "Organization", "name": "GenLayer Labs", "url": "https://genswarms.com/" }
        {%- if page.meta.git_revision_date_localized_raw_iso_datetime %},
        "dateModified": {{ (page.meta.git_revision_date_localized_raw_iso_datetime | replace(" ", "T")) | tojson }}
        {%- endif %}
      },
      {
        "@type": "BreadcrumbList",
        "itemListElement": [
          { "@type": "ListItem", "position": 1, "name": "Docs", "item": "https://genswarms.com/docs/" },
          { "@type": "ListItem", "position": 2, "name": {{ (page.title or config.site_name) | tojson }}, "item": {{ page.canonical_url | tojson }} }
        ]
      }
    ]
  }
  </script>
  {%- endif %}
{% endblock %}
