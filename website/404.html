<!DOCTYPE html>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Instrument+Sans:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
<style>
:root{--paper:#FBFBF8;--ink:#101114;--ink-2:#3b3d44;--ink-3:#6b6e77;--line-2:#d3d0c4;--accent:#1B4DFF;--r-spring:cubic-bezier(.2,.9,.25,1)}
*{margin:0;padding:0;box-sizing:border-box}
::selection{background:var(--accent);color:#fff}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--paper);color:var(--ink);font-family:"Instrument Sans",sans-serif;-webkit-font-smoothing:antialiased;padding:32px;text-align:center}
.wrap{max-width:540px}
.mark{width:46px;height:46px;margin:0 auto 30px;display:block}
.mark line{stroke:var(--ink-3);stroke-width:1.1}
.mark circle{fill:var(--accent)}
.code{font-family:"JetBrains Mono",monospace;font-size:13px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);margin-bottom:14px}
h1{font-family:"Bricolage Grotesque",sans-serif;font-weight:800;font-size:clamp(40px,9vw,72px);line-height:1;letter-spacing:-.03em;margin-bottom:16px}
p{font-size:16.5px;color:var(--ink-2);max-width:34ch;margin:0 auto 30px}
.row{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:8px;font-size:15px;font-weight:600;padding:12px 20px;border-radius:11px;text-decoration:none;transition:transform .3s var(--r-spring),border-color .3s ease,background .3s ease}
.btn-primary{background:var(--ink);color:var(--paper)}
.btn-primary:hover{background:var(--accent)}
.btn-ghost{color:var(--ink);border:1px solid var(--line-2)}
.btn-ghost:hover{border-color:var(--ink)}
.btn svg{transition:transform .35s var(--r-spring)}
.btn:hover svg{transform:translateX(3px)}
</style>
</head>
<body>
  <div class="wrap">
    <svg class="mark" viewBox="0 0 26 26" aria-hidden="true">
      <line x1="6" y1="6" x2="20" y2="9"/><line x1="6" y1="6" x2="9" y2="20"/>
      <line x1="20" y1="9" x2="20" y2="20"/><line x1="9" y1="20" x2="20" y2="20"/>
      <line x1="6" y1="6" x2="20" y2="20"/>
      <circle cx="6" cy="6" r="2.6"/><circle cx="20" cy="9" r="2.6"/>
      <circle cx="9" cy="20" r="2.6"/><circle cx="20" cy="20" r="2.6"/>
    </svg>
    <div class="code">Error 404</div>
    <h1>This node isn't on the graph.</h1>
    <p>The page you're looking for doesn't exist — or it wandered off the topology.</p>
    <div class="row">
      <a class="btn btn-primary" href="/">Back to home <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 10L10 3M10 3H4M10 3V9"/></svg></a>
      <a class="btn btn-ghost" href="/docs/">Read the docs</a>
    </div>
  </div>
</body>
</html>
