site_name: GenSwarms
site_url: https://genswarms.com/docs/
site_description: >-
  Documentation for GenSwarms — a declared runtime for swarms of AI agents:
  isolated workers, explicit message paths, deterministic objects, live events,
  API control, and supervised recovery.
site_author: GenLayer Labs
copyright: MIT License · © 2026 GenLayer Labs

repo_url: https://github.com/genlayerlabs/genswarms
repo_name: genlayerlabs/genswarms
edit_uri: edit/main/docs/

docs_dir: docs

theme:
  name: material
  custom_dir: overrides
  language: en
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  font:
    text: Instrument Sans
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.instant
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit

# Make the header logo link back to the marketing site, not the docs index.
extra:
  homepage: https://genswarms.com/
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/genlayerlabs/genswarms

extra_css:
  - assets/brand.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search
  - git-revision-date-localized:
      type: date
      fallback_to_build_date: true
  - social:
      cards_layout_options:
        background_color: "#101114"
        color: "#FBFBF8"
  - blog:
      blog_dir: blog
      blog_toc: true
      post_url_format: "{slug}"
      post_readtime: true
      post_date_format: long

nav:
  - Home: README.md
  - Getting started:
      - Install & first swarm: getting-started.md
      - Configuration: configuration.md
      - CLI reference: cli.md
  - Core concepts:
      - Architecture: architecture.md
      - Messaging & routing: messaging.md
      - Objects: objects.md
      - Skills: skills.md
  - Backends & deployment:
      - Backends: backends.md
      - Containers: containers.md
  - APIs:
      - REST API: rest-api.md
      - WebSocket API: websocket.md
      - Programmatic usage: programmatic.md
  - Operations:
      - Observability: observability.md
      - Testing: testing.md
      - Troubleshooting: troubleshooting.md
  - Blog:
      - blog/index.md
