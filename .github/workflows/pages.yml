name: Deploy site (landing + docs)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install MkDocs Material
        run: pip install "mkdocs-material>=9.5,<10"

      - name: Build docs into _site/docs
        run: mkdocs build --strict --site-dir _site/docs

      - name: Place landing page at site root
        run: |
          cp website/index.html _site/index.html
          cp website/og-image.png _site/og-image.png
          cp website/CNAME _site/CNAME
          cp website/robots.txt _site/robots.txt
          cp website/sitemap.xml _site/sitemap.xml
          cp website/404.html _site/404.html
          touch _site/.nojekyll
          # Serve the canonical skill at genswarms.com/skill.md (the landing's
          # copy-to-agent prompt points here; kept in sync from the repo root).
          cp SKILL.md _site/skill.md

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
