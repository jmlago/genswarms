name: Deploy site (landing + docs)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so git-revision-date can read last-modified dates

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install imaging deps (for social cards)
        run: sudo apt-get update && sudo apt-get install -y libcairo2-dev libfreetype6-dev libffi-dev libjpeg-dev libpng-dev libz-dev pngquant

      - name: Install MkDocs Material
        run: pip install "mkdocs-material[imaging]>=9.5,<10" mkdocs-git-revision-date-localized-plugin

      - name: Build docs into _site/docs
        run: mkdocs build --strict --site-dir _site/docs

      - name: Place landing page at site root
        run: |
          cp website/index.html _site/index.html
          cp website/og-image.png _site/og-image.png
          cp website/CNAME _site/CNAME
          cp website/robots.txt _site/robots.txt
          cp website/sitemap.xml _site/sitemap.xml
          cp website/404.html _site/404.html
          touch _site/.nojekyll
          # Serve the canonical skill at genswarms.com/skill.md (the landing's
          # copy-to-agent prompt points here; kept in sync from the repo root).
          cp SKILL.md _site/skill.md
          # AI/agent surface: curated index (llms.txt) + full-text dump (llms-full.txt)
          cp website/llms.txt _site/llms.txt
          {
            echo "# GenSwarms — full documentation"
            echo
            echo "> Concatenated from the GenSwarms repository for LLM ingestion."
            echo "> Source: https://github.com/genlayerlabs/genswarms"
            for f in SKILL.md docs/README.md docs/getting-started.md docs/configuration.md \
                     docs/cli.md docs/architecture.md docs/messaging.md docs/objects.md \
                     docs/skills.md docs/backends.md docs/containers.md docs/rest-api.md \
                     docs/websocket.md docs/programmatic.md docs/observability.md \
                     docs/testing.md docs/troubleshooting.md; do
              echo; echo "---"; echo; cat "$f"
            done
          } > _site/llms-full.txt

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
